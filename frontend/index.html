<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Management</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="lead-container">
        <!-- Header and Search Bar -->
        <header class="lead-header">
            <h2>Leads Management</h2>
            <div class="search-box">
                <input type="text" id="searchInput" , placeholder="Search by name, email, company .... ">
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
        </header>
        <!-- Add New Button -->
        <div class="action-bar">
            <button id="addLeadBtn" class="btn btn-secondary">+ Add Lead</button>
        </div>

        <div class="table-container">
            <table id="leadsTable">
                <thead>
                    <tr>
                        <th>Date Added</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Company</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                </tbody>
            </table>
            <div id="noLeadsMessage" class="no-leads-message">No Leads Found. Click "+ Add New Lead" to get started
            </div>
        </div>
    </div>

    <div id="leadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Lead</h3>
                <span class="close-modal" id="closeModalBtn">&times;</span>
            </div>
            <form id="leadForm" novalidate>
                <div class="form-group">
                    <label for="leadName">Name *</label>
                    <input type="text" id="leadName" required>
                    <span class="error-msg" id="nameError">Name is required</span>
                </div>
                <div class="form-group">
                    <label for="leadEmail">Email *</label>
                    <input type="email" id="leadEmail" required>
                    <span class="error-msg" id="emailError">Please enter a valid email</span>
                </div>
                <div class="form-group">
                    <label for="leadMobile">Mobile *</label>
                    <input type="tel" id="leadMobile" required>
                    <span class="error-msg" id="mobileError">Mobile number is required</span>
                </div>
                <div class="form-group">
                    <label for="leadCompany">Company</label>
                    <input type="text" id="leadCompany">
                </div>
                <div class="form-group">
                    <label for="leadSource">Source</label>
                    <input type="text" id="leadSource">
                </div>
                <div class="form-group">
                    <label for="leadStatus">Status</label>
                    <select id="leadStatus">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="qualified">Qualified</option>
                        <option value="lost">Lost</option>
                    </select>
                    <span class="error-msg" id="nameError">Status is required</span>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Lead</button>
                </div>
        </div>
        </form>
    </div>
    <script type="module" src="./scripts/app.js"></script>
</body>

</html>
