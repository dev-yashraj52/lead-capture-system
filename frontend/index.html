<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Management</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="lead-container">
        <!-- Header and Search Bar -->
        <header class="lead-header">
            <h2>Leads Management</h2>
            <div class="search-box">
                <input type="text" id="searchInput" , placeholder="Search by name, email, company .... ">
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
        </header>
        <!-- Add New Button -->
        <div class="action-bar">
            <button id="addLeadBtn" class="btn btn-secondary">+ Add Lead</button>
        </div>

        <div class="table-container">
            <table id="leadsTable">
                <thead>
                    <tr>
                        <th>Date Added</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Company</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                </tbody>
            </table>
            <div id="noLeadsMessage" class="no-leads-message">No Leads Found. Click "+ Add New Lead" to get started
            </div>
        </div>
    </div>
</body>

</html>
